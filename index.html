<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Flow Commander v7</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="controls">
        <div class="controls-scrollable">
            <h3>🚚 Logistics Flow Pro</h3>
            
            <div class="file-upload-wrapper">
                <label for="fileInput" class="btn btn-upload" id="uploadLabel">
                    📂 Завантажити файл
                </label>
                <input type="file" id="fileInput" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" />
            </div>

            <div id="dateFiltersContainer">
                <h4>📅 Зріз по даті</h4>
                <div id="dateChips" class="date-chips"></div>
            </div>

            <div id="cityFiltersContainer">
                <h4>📍 Відправник <span class="filter-hint">Обери потрібні</span></h4>
                <div class="filter-list" id="cityA_list"></div>
                
                <h4>🏁 Отримувач <span class="filter-hint">Обери потрібні</span></h4>
                <div class="filter-list" id="cityB_list"></div>
            </div>

            <div id="settings">
                <h4>Зовнішній вигляд</h4>
                <div class="control-group">
                    <div class="slider-label">Колір ліній</div>
                    <select id="colorSelect">
                        <option value="#38bdf8">🟦 Блакитний</option>
                        <option value="#10b981">🟩 Зелений</option>
                        <option value="#f43f5e">🟥 Червоний</option>
                        <option value="#f59e0b">🟧 Помаранчевий</option>
                        <option value="#a855f7">🟪 Фіолетовий</option>
                    </select>

                    <div class="slider-label" style="margin-top: 10px;"><span>Товщина ліній</span><span id="weightVal" class="slider-val">2</span></div>
                    <input type="range" id="weightRange" min="1" max="10" value="2">
                    <div class="slider-label" style="margin-top: 10px;">Колір кордонів</div>
                    <select id="borderColorSelect">
                        <option value="#38bdf8">🟦 Блакитний</option>
                        <option value="#ffffff">⬜ Білий</option>
                        <option value="#fbbf24">🟨 Жовтий</option>
                        <option value="#10b981">🟩 Зелений</option>
                        <option value="#f43f5e">🟥 Червоний</option>
                    </select>
                </div>

                <h4>Відображення даних</h4>
                <div class="control-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="animateFlow">
                        Анімувати рух
                    </label>
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="alwaysShowLabels">
                        Відображати метрики
                    </label>
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="showCityLabels">
                        Відображати назви точок
                    </label>
                </div>
                
                <div id="status" style="color: var(--text-muted)">Дані не завантажено</div>
            </div>
        </div>

        <div class="export-section">
            <button id="snapBtn" class="btn btn-export">
                📸 Скачати мапу (.png)
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet-simple-map-screenshoter"></script>
    
    <script src="script.js"></script>
</body>
</html>
